databases:
  - name: trading-coach-db
    databaseName: trading_coach
    user: trading_admin
    plan: free
    region: singapore
    postgresMajorVersion: 16

services:
  - type: web
    name: trading-coach-api
    env: docker
    dockerfilePath: docker/Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-coach-db
          attribute: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
